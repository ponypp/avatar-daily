<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="精看日常" />
  <title>精看日常 · 每日头像与命理参考</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' x='5'>精</text></svg>" />
  <!-- lunar-typescript via importmap -->
  <script type="importmap">
  {
    "imports": {
      "lunar-typescript": "https://cdn.jsdelivr.net/npm/lunar-typescript@1.7.7/+esm"
    }
  }
  </script>
  <style>
    /* ===== Reset & Base ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0f0f1a;
      color: #e6e6f0;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    body { padding-bottom: 80px; }
    .hidden { display: none !important; }
    .muted { color: #6b6b80; font-size: 12px; }

    /* ===== Sections ===== */
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1f1f30;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #c9a96e;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .section-title::before { content: "· "; }

    /* ===== Header / Today's Date ===== */
    .today-header {
      text-align: center;
      padding: 16px 0 10px;
    }
    .today-date { font-size: 13px; color: #8888a0; }
    .today-ganzhi { font-size: 28px; font-weight: 600; color: #c9a96e; margin: 4px 0; }
    .today-qiyun { margin-top: 6px; }
    .qiyun-stars { font-size: 18px; letter-spacing: 2px; }
    .qiyun-mood { font-size: 12px; color: #8888a0; margin-top: 2px; }

    /* ===== 命盘 (四柱) ===== */
    .bazi-pillars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .pillar {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }
    .pillar--day { border-color: #c9a96e; background: #2a1f10; }
    .pillar__label { font-size: 11px; color: #8888a0; margin-bottom: 4px; }
    .pillar__gan { font-size: 22px; color: #c9a96e; font-weight: 600; }
    .pillar--day .pillar__gan { color: #f5d68a; }
    .pillar__zhi { font-size: 22px; color: #e6e6f0; }
    .pillar__nayin { font-size: 9px; color: #6b6b80; margin-top: 2px; }

    /* ===== 用神 ===== */
    .ys-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .ys-label { color: #8888a0; width: 40px; }
    .ys-value { color: #c9a96e; }
    .ys-yong { font-size: 16px; font-weight: 600; }
    .ys-tag {
      background: #2a2a40;
      color: #8888a0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .ys-tag--warn { background: #4a2820; color: #f5a0a0; }

    /* ===== 神煞 ===== */
    .shensha-block { display: flex; flex-wrap: wrap; gap: 6px; }
    .shensha-tag {
      background: #2a2440;
      color: #a8a0d0;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
    }

    /* ===== 5 维运势 ===== */
    .fortune-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    @media (max-width: 380px) { .fortune-grid { grid-template-columns: repeat(2, 1fr); } }
    .fortune-card {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }
    .fortune-card__header { display: flex; justify-content: center; align-items: center; gap: 3px; margin-bottom: 2px; }
    .fortune-card__emoji { font-size: 14px; }
    .fortune-card__label { font-size: 11px; font-weight: 600; }
    .fortune-card__stars { font-size: 12px; letter-spacing: 1px; margin: 2px 0; }
    .fortune-card__desc { font-size: 10px; color: #8888a0; line-height: 1.4; min-height: 28px; }

    /* ===== 7 天预报 ===== */
    .forecast-list {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .forecast-item {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 6px;
      padding: 6px 2px;
      text-align: center;
    }
    .forecast-item__day { font-size: 11px; color: #c9a96e; font-weight: 600; }
    .forecast-item__date { font-size: 9px; color: #6b6b80; }
    .forecast-item__gz { font-size: 11px; color: #e6e6f0; margin: 2px 0; }
    .forecast-item__stars { font-size: 10px; letter-spacing: 0; }

    /* ===== 大运/流年 ===== */
    .dayun-header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .dayun-label { font-size: 10px; color: #6b6b80; }
    .dayun-current, .dayun-liunian, .dayun-age { font-size: 14px; color: #c9a96e; font-weight: 600; }
    .dayun-track { display: flex; gap: 4px; overflow-x: auto; padding: 4px 0; }
    .dayun-step {
      flex-shrink: 0;
      width: 36px;
      text-align: center;
      padding: 4px;
      border: 1px solid #2a2a40;
      border-radius: 4px;
      background: #1a1a2e;
    }
    .dayun-step--current { border-color: #c9a96e; background: #2a1f10; }
    .dayun-step__age { font-size: 9px; color: #6b6b80; }
    .dayun-step__zhi { font-size: 14px; color: #e6e6f0; }

    /* ===== 今日头像 ===== */
    .avatar-card { text-align: center; }
    .avatar-img {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .avatar-actions { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .avatar-empty { text-align: center; padding: 30px 0; }
    .avatar-empty__text { color: #6b6b80; margin-bottom: 16px; }

    /* ===== 历史 ===== */
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 6px;
    }
    .history-item {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
    }
    .history-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .history-item__date {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
      font-size: 10px;
      padding: 2px 4px;
    }
    .history-item__star {
      position: absolute;
      top: 2px;
      right: 4px;
      color: #fbbf24;
      font-size: 14px;
    }

    /* ===== 用户卡 ===== */
    .user-card { font-size: 12px; }
    .user-row { display: flex; gap: 8px; padding: 3px 0; }
    .user-label { color: #8888a0; width: 50px; }

    /* ===== Buttons ===== */
    .btn-primary, .btn-secondary {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      font-weight: 500;
    }
    .btn-primary { background: #c9a96e; color: #0f0f1a; }
    .btn-secondary { background: #2a2a40; color: #e6e6f0; }

    /* ===== Status ===== */
    #genStatus { text-align: center; padding: 10px; color: #c9a96e; }

    /* ===== Bottom Nav ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      border-top: 1px solid #2a2a40;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: #8888a0;
      font-size: 12px;
      cursor: pointer;
    }

    /* ===== Modal ===== */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal-card {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-card--large { max-width: 90vw; }
    .modal-header {
      font-size: 18px;
      font-weight: 600;
      color: #c9a96e;
      margin-bottom: 12px;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }

    .modal-image { width: 100%; border-radius: 8px; margin: 12px 0; }

    .field { margin-bottom: 12px; }
    .field__label { display: block; font-size: 12px; color: #8888a0; margin-bottom: 4px; }
    .field input, .field textarea {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2a2a40;
      color: #e6e6f0;
      padding: 8px;
      border-radius: 6px;
      font-size: 14px;
    }
    .field textarea { resize: vertical; min-height: 50px; }

    /* ===== Option Button Row ===== */
    .opt-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .opt-btn {
      background: #0f0f1a;
      border: 1px solid #2a2a40;
      color: #e6e6f0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      min-width: 50px;
    }
    .opt-btn--active { background: #c9a96e; color: #0f0f1a; border-color: #c9a96e; }
    .opt-btn--mini { padding: 3px 8px; font-size: 11px; }
    .opt-btn__desc { font-size: 9px; color: #6b6b80; margin-top: 1px; }
    .opt-btn--active .opt-btn__desc { color: #1a1a2e; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #c9a96e;
      color: #0f0f1a;
      padding: 8px 16px;
      border-radius: 8px;
      z-index: 200;
      font-size: 13px;
    }

    /* ===== Empty ===== */
    .empty { text-align: center; color: #6b6b80; padding: 20px; }

    /* ===== Compliance ===== */
    .compliance { text-align: center; font-size: 10px; color: #4a4a5a; padding: 10px; }
  </style>
</head>
<body>

<!-- 今日概览 -->
<div class="section">
  <div id="today-header"></div>
  <div style="text-align:center; margin-top: 8px;">
    <button id="btnEditProfile" class="btn-secondary" style="font-size: 11px; padding: 4px 10px;">个人资料</button>
    <button id="btnSettings" class="btn-secondary" style="font-size: 11px; padding: 4px 10px;">设置</button>
  </div>
</div>

<!-- 命盘 -->
<div class="section">
  <div class="section-title">命盘</div>
  <div id="bazi-pillars" class="bazi-pillars"></div>
  <div id="yongshen-block" style="margin-top: 12px;"></div>
  <div id="shensha-block" class="shensha-block" style="margin-top: 8px;"></div>
</div>

<!-- 5 维运势 -->
<div class="section">
  <div class="section-title">今日运势</div>
  <div id="fortune-grid" class="fortune-grid"></div>
</div>

<!-- 7 天预报 -->
<div class="section">
  <div class="section-title">未来 7 日</div>
  <div id="forecast-list" class="forecast-list"></div>
</div>

<!-- 大运/流年 -->
<div class="section">
  <div class="section-title">大运流年</div>
  <div id="dayun-block"></div>
</div>

<!-- 今日头像 -->
<div class="section">
  <div class="section-title">今日头像</div>
  <div id="today-avatar"></div>
  <div id="genStatus" class="hidden">排盘 + AI 绘图中(约 10-20 秒)</div>
</div>

<!-- 历史头像 -->
<div class="section">
  <div class="section-title">历史头像</div>
  <div id="history-grid" class="history-grid"></div>
</div>

<!-- 用户信息 -->
<div class="section">
  <div class="section-title">个人资料</div>
  <div id="user-card" class="user-card"></div>
</div>

<div class="compliance">本应用仅供文化娱乐参考,不构成专业命理建议</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <button onclick="document.getElementById('today-header').scrollIntoView({behavior:'smooth'})">↑ 顶</button>
  <button id="btnGenerate">生成今日</button>
  <button onclick="document.getElementById('history-grid').scrollIntoView({behavior:'smooth'})">↓ 历史</button>
</div>

<!-- Modal: 个人资料 / 设置 -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal-card">
    <div class="modal-header" id="modalTitle">个人资料</div>

    <!-- 个人资料表单 -->
    <div id="modalProfileForm">
      <div class="field">
        <label class="field__label">生日(公历)</label>
        <input type="date" id="modalBirthDate" />
      </div>
      <div class="field">
        <label class="field__label">出生时间(可空,默认 12:00)</label>
        <input type="time" id="modalBirthTime" />
      </div>

      <div class="field">
        <label class="field__label">性别</label>
        <div id="modalGenderRow" class="opt-row"></div>
      </div>

      <div class="field">
        <label class="field__label">头像风格(PRD 4.1.1)</label>
        <div id="modalStyleRow" class="opt-row"></div>
      </div>

      <div class="field">
        <label class="field__label">场景(PRD 4.1.4)</label>
        <div id="modalSceneRow" class="opt-row"></div>
      </div>

      <div class="field">
        <label class="field__label">素材类型(PRD 4.1.3,人像+人像时才用参照)</label>
        <div id="modalMaterialRow" class="opt-row"></div>
      </div>

      <div class="field">
        <label class="field__label">人脸引用强度(PRD 4.1.2)</label>
        <div id="modalFaceRefRow" class="opt-row"></div>
      </div>

      <div class="field">
        <label class="field__label">调性(L4 风格修饰)</label>
        <div id="modalToneRow" class="opt-row"></div>
      </div>

      <div class="field">
        <label class="field__label">个人格言(30-100 字,影响 prompt + 解读)</label>
        <textarea id="modalMotto" maxlength="100" placeholder="例:心若不动,风又奈何"></textarea>
        <div id="modalMottoRow" class="opt-row" style="margin-top: 4px;"></div>
      </div>

      <div class="field">
        <label class="field__label">参考图(可选,影响 prompt 描述)</label>
        <div style="background: #2a2a40; padding: 8px; border-radius: 6px; font-size: 11px; color: #8888a0; margin-bottom: 6px; line-height: 1.5;">
          ⚠️ 当前 PWA 没有 IP-Adapter 后端,上传的图只会作为 prompt 描述("参考用户上传的人像"),不会真的换脸。完整功能需要 ComfyUI/SDXL 后端。
        </div>
        <input type="file" id="modalRefUpload" accept="image/*" style="font-size: 12px;" />
        <div style="margin-top: 6px;">
          <img id="modalRefPreview" class="hidden" style="max-width: 100px; max-height: 100px; border-radius: 6px; border: 1px solid #2a2a40;" />
          <button type="button" id="btnRefRemove" class="btn-secondary hidden" style="font-size: 11px; padding: 4px 8px; margin-left: 6px;">移除</button>
        </div>
      </div>
    </div>

    <!-- 设置表单 -->
    <div id="modalSettingsForm" class="hidden">
      <div class="field">
        <label class="field__label">CORS 代理 URL(已默认填好,需自己部署可改)</label>
        <input type="text" id="modalProxy" placeholder="https://your-worker.workers.dev" />
      </div>
      <div class="field">
        <label class="field__label">MiniMax API Key(可选,worker 已代持)</label>
        <input type="password" id="modalKey" placeholder="sk-cp-..." />
      </div>
      <div style="background: #2a2a40; padding: 10px; border-radius: 6px; font-size: 12px; color: #8888a0; line-height: 1.6;">
        ⚙ API key 只存浏览器本地(localStorage),不会上传。<br>
        代理 URL 已默认指向已部署的 Cloudflare Worker。
      </div>
    </div>

    <div class="modal-actions">
      <button id="btnModalCancel" class="btn-secondary">取消</button>
      <button id="btnModalSave" class="btn-primary">保存</button>
    </div>
  </div>
</div>

<!-- 入口 -->
<script type="module" src="js/app.js"></script>
</body>
</html>
